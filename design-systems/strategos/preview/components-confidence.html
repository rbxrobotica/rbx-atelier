<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card-frame">
  <div class="eyebrow">Confidence indicator · 5 segments + tabular %</div>
  <div style="display:grid; grid-template-columns:auto 1fr auto; gap:8px 14px; align-items:center; font-family:var(--font-mono); font-size:12px;">
    <div style="color:var(--ink-2);">82%</div>
    <div style="display:flex; gap:3px;"><div style="flex:1; height:6px; background:var(--cyan-brand)"></div><div style="flex:1; height:6px; background:var(--cyan-brand)"></div><div style="flex:1; height:6px; background:var(--cyan-brand)"></div><div style="flex:1; height:6px; background:var(--cyan-brand)"></div><div style="flex:1; height:6px; background:var(--obsidian-3)"></div></div>
    <div style="color:var(--cyan-brand); text-transform:uppercase; letter-spacing:0.08em;">high</div>

    <div style="color:var(--ink-2);">68%</div>
    <div style="display:flex; gap:3px;"><div style="flex:1; height:6px; background:var(--cyan-brand)"></div><div style="flex:1; height:6px; background:var(--cyan-brand)"></div><div style="flex:1; height:6px; background:var(--cyan-brand)"></div><div style="flex:1; height:6px; background:var(--obsidian-3)"></div><div style="flex:1; height:6px; background:var(--obsidian-3)"></div></div>
    <div style="color:var(--ink-1); text-transform:uppercase; letter-spacing:0.08em;">moderate</div>

    <div style="color:var(--ink-2);">42%</div>
    <div style="display:flex; gap:3px;"><div style="flex:1; height:6px; background:var(--warn)"></div><div style="flex:1; height:6px; background:var(--warn)"></div><div style="flex:1; height:6px; background:var(--obsidian-3)"></div><div style="flex:1; height:6px; background:var(--obsidian-3)"></div><div style="flex:1; height:6px; background:var(--obsidian-3)"></div></div>
    <div style="color:var(--warn); text-transform:uppercase; letter-spacing:0.08em;">low</div>

    <div style="color:var(--ink-2);">—</div>
    <div style="display:flex; gap:3px;"><div style="flex:1; height:6px; background:var(--obsidian-3); outline:1px dashed var(--ink-3); outline-offset:-1px"></div><div style="flex:1; height:6px; background:var(--obsidian-3)"></div><div style="flex:1; height:6px; background:var(--obsidian-3)"></div><div style="flex:1; height:6px; background:var(--obsidian-3)"></div><div style="flex:1; height:6px; background:var(--obsidian-3)"></div></div>
    <div style="color:var(--uncertain); text-transform:uppercase; letter-spacing:0.08em;">unknown</div>
  </div>
</div>
</body></html>
