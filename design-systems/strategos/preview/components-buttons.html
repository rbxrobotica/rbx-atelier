<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card-frame">
  <div class="eyebrow">Buttons · primary cyan, aurum (commit), ghost, danger</div>
  <div style="display:flex; gap:10px; flex-wrap:wrap;">
    <button style="font-family:var(--font-sans); font-size:13px; font-weight:500; padding:8px 14px; background:rgba(0,255,255,0.08); border:1px solid var(--cyan-brand); color:var(--cyan-brand); border-radius:2px; cursor:pointer; letter-spacing:0.02em;">Accept recommendation</button>
    <button style="font-family:var(--font-sans); font-size:13px; font-weight:500; padding:8px 14px; background:rgba(201,168,106,0.10); border:1px solid var(--aurum); color:var(--aurum-bright); border-radius:2px; cursor:pointer; letter-spacing:0.02em;">Commit override</button>
    <button style="font-family:var(--font-sans); font-size:13px; font-weight:500; padding:8px 14px; background:transparent; border:1px solid var(--hairline-strong); color:var(--ink-1); border-radius:2px; cursor:pointer; letter-spacing:0.02em;">Defer</button>
    <button style="font-family:var(--font-sans); font-size:13px; font-weight:500; padding:8px 14px; background:transparent; border:1px solid var(--risk); color:var(--risk); border-radius:2px; cursor:pointer; letter-spacing:0.02em;">Reject</button>
  </div>
  <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:4px;">
    <button style="font-family:var(--font-sans); font-size:12px; padding:6px 10px; background:transparent; border:1px solid var(--hairline); color:var(--ink-2); border-radius:2px; cursor:pointer;">Learn more</button>
    <button style="font-family:var(--font-sans); font-size:12px; padding:6px 10px; background:transparent; border:1px solid var(--hairline); color:var(--ink-2); border-radius:2px; cursor:pointer;">Inject signal</button>
    <button style="font-family:var(--font-sans); font-size:12px; padding:6px 10px; background:transparent; border:1px solid var(--ink-3); color:var(--ink-3); border-radius:2px; cursor:not-allowed;">Disabled</button>
  </div>
</div>
</body></html>
