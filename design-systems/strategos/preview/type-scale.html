<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card-frame">
  <div class="eyebrow">Type scale · sans</div>
  <div style="display:grid; grid-template-columns: 80px 1fr; gap:6px 16px; align-items:baseline; font-family:var(--font-mono); font-size:10px; color:var(--ink-2);">
    <div>display 40</div><div style="font-family:var(--font-sans); font-size:40px; font-weight:600; color:var(--ink-0); letter-spacing:-0.015em; line-height:1.1;">Strategic Command Center</div>
    <div>h1 28</div><div style="font-family:var(--font-sans); font-size:28px; font-weight:600; color:var(--ink-0); letter-spacing:-0.01em; line-height:1.2;">Pending Decisions</div>
    <div>h2 20</div><div style="font-family:var(--font-sans); font-size:20px; font-weight:500; color:var(--ink-0); line-height:1.3;">Risk Landscape</div>
    <div>h3 16</div><div style="font-family:var(--font-sans); font-size:16px; font-weight:500; color:var(--ink-0); line-height:1.4;">Increase position by 10%</div>
    <div>body 14</div><div style="font-family:var(--font-sans); font-size:14px; color:var(--ink-1); line-height:1.5;">Market volatile. Regulatory change pending.</div>
    <div>meta 12</div><div style="font-family:var(--font-sans); font-size:12px; color:var(--ink-2); line-height:1.4;">Last update · 2 minutes ago</div>
  </div>
</div>
</body></html>
