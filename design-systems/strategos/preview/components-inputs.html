<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card-frame">
  <div class="eyebrow">Inputs · signal injection, override rationale</div>
  <div style="display:flex; flex-direction:column; gap:10px;">
    <div>
      <label style="display:block; font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-2); margin-bottom:5px;">Signal · qualitative context</label>
      <input value="Regulatory environment uncertain through Q2" style="width:100%; padding:8px 10px; background:var(--obsidian-1); border:1px solid var(--hairline-strong); border-radius:2px; color:var(--ink-0); font-family:var(--font-sans); font-size:13px; box-sizing:border-box;" />
    </div>
    <div>
      <label style="display:block; font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--aurum); margin-bottom:5px;">Override rationale · required</label>
      <textarea style="width:100%; padding:8px 10px; background:var(--obsidian-1); border:1px solid var(--aurum-dim); border-radius:2px; color:var(--ink-0); font-family:var(--font-sans); font-size:13px; box-sizing:border-box; min-height:54px; resize:none;">Markets may not behave like 2021. Holding until Q1 regulatory guidance is released.</textarea>
    </div>
  </div>
</div>
</body></html>
