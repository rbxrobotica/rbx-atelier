<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card-frame">
  <div class="eyebrow">Semantic · state of the world (never chrome). Each color implies an action.</div>
  <div class="row">
    <div class="swatch invert" style="background:#C56A6A"><span class="name">risk</span><span class="label">#C56A6A</span></div>
    <div class="swatch invert" style="background:#D9B55A"><span class="name">warn</span><span class="label">#D9B55A</span></div>
    <div class="swatch invert" style="background:#7FB77E"><span class="name">ok</span><span class="label">#7FB77E</span></div>
    <div class="swatch" style="background:#7A93B0"><span class="name">info</span><span class="label">#7A93B0</span></div>
    <div class="swatch" style="background:#8A7FAE"><span class="name">uncertain</span><span class="label">#8A7FAE · hypothesis</span></div>
  </div>
  <div class="row">
    <div class="swatch" style="background:rgba(197,106,106,0.12); border-color:#C56A6A"><span class="name">risk-subtle</span></div>
    <div class="swatch" style="background:rgba(217,181,90,0.12); border-color:#D9B55A"><span class="name">warn-subtle</span></div>
    <div class="swatch" style="background:rgba(127,183,126,0.12); border-color:#7FB77E"><span class="name">ok-subtle</span></div>
    <div class="swatch" style="background:rgba(122,147,176,0.12); border-color:#7A93B0"><span class="name">info-subtle</span></div>
    <div class="swatch" style="background:rgba(138,127,174,0.12); border-color:#8A7FAE"><span class="name">uncertain-subtle</span></div>
  </div>
</div>
</body></html>
