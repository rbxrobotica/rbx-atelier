<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card-frame">
  <div class="eyebrow">Empty / loading / error states</div>
  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
    <div style="border:1px dashed var(--hairline-strong); border-radius:4px; padding:18px; text-align:center;">
      <div style="font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-2);">no pending decisions</div>
      <div style="font-size:12px; color:var(--ink-2); margin-top:6px; line-height:1.5;">All recommendations have been adjudicated.</div>
    </div>
    <div style="border:1px solid var(--hairline); border-radius:4px; padding:18px; text-align:center;">
      <div style="font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--cyan-brand);">loading…</div>
      <div style="display:flex; gap:4px; justify-content:center; margin-top:10px;"><span style="width:8px; height:2px; background:var(--cyan-dim);"></span><span style="width:24px; height:2px; background:var(--cyan-brand);"></span><span style="width:8px; height:2px; background:var(--cyan-dim);"></span></div>
    </div>
    <div style="border:1px solid var(--risk); background:rgba(197,106,106,0.06); border-radius:4px; padding:18px; text-align:center;">
      <div style="font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--risk);">core unreachable</div>
      <div style="font-size:12px; color:var(--ink-1); margin-top:6px; line-height:1.5;">Last sync 14:21:07Z · retrying in 8s</div>
    </div>
  </div>
</div>
</body></html>
