<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card-frame">
  <div class="eyebrow">Elevation · hairlines, not shadows</div>
  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;">
    <div style="background:var(--obsidian-1); border:1px solid var(--hairline); border-radius:4px; padding:14px; min-height:80px;">
      <div style="font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-2);">level 1 · raised</div>
      <div style="font-size:13px; color:var(--ink-1); margin-top:6px;">obsidian-1 + hairline</div>
    </div>
    <div style="background:var(--obsidian-2); border:1px solid var(--hairline); border-radius:4px; padding:14px; min-height:80px;">
      <div style="font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-2);">level 2 · card</div>
      <div style="font-size:13px; color:var(--ink-1); margin-top:6px;">obsidian-2 + hairline</div>
    </div>
    <div style="background:var(--obsidian-2); border:1px solid var(--hairline-strong); border-radius:8px; padding:14px; min-height:80px; box-shadow: 0 16px 40px rgba(0,0,0,0.55);">
      <div style="font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-2);">level 3 · overlay</div>
      <div style="font-size:13px; color:var(--ink-1); margin-top:6px;">+ outer shadow</div>
    </div>
  </div>
  <div class="muted" style="font-size:12px;">Cards never carry shadows. Shadows only on dialogs, popovers, command-dock.</div>
</div>
</body></html>
