<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card-frame">
  <div class="eyebrow">Risk badge · probability · impact · trend</div>
  <div style="display:flex; gap:10px; flex-wrap:wrap;">
    <div style="display:inline-flex; align-items:center; gap:8px; padding:6px 10px; background:rgba(197,106,106,0.10); border:1px solid var(--risk); border-radius:2px;">
      <span style="width:6px; height:6px; background:var(--risk); border-radius:50%;"></span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-0); text-transform:uppercase; letter-spacing:0.08em;">CRITICAL</span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-1);">P 60% · I 8 · 9.3</span>
      <span style="color:var(--risk); font-size:11px;">↑</span>
    </div>
    <div style="display:inline-flex; align-items:center; gap:8px; padding:6px 10px; background:rgba(217,181,90,0.10); border:1px solid var(--warn); border-radius:2px;">
      <span style="width:6px; height:6px; background:var(--warn); border-radius:50%;"></span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-0); text-transform:uppercase; letter-spacing:0.08em;">ELEVATED</span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-1);">P 35% · I 7 · 7.8</span>
      <span style="color:var(--ink-2); font-size:11px;">→</span>
    </div>
    <div style="display:inline-flex; align-items:center; gap:8px; padding:6px 10px; background:rgba(122,147,176,0.10); border:1px solid var(--info); border-radius:2px;">
      <span style="width:6px; height:6px; background:var(--info); border-radius:50%;"></span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-0); text-transform:uppercase; letter-spacing:0.08em;">MONITORED</span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-1);">P 20% · I 4 · 5.2</span>
      <span style="color:var(--ok); font-size:11px;">↓</span>
    </div>
    <div style="display:inline-flex; align-items:center; gap:8px; padding:6px 10px; background:rgba(127,183,126,0.10); border:1px solid var(--ok); border-radius:2px;">
      <span style="width:6px; height:6px; background:var(--ok); border-radius:50%;"></span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-0); text-transform:uppercase; letter-spacing:0.08em;">RESOLVED</span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-1);">closed · 2026-04-02</span>
    </div>
  </div>
</div>
</body></html>
