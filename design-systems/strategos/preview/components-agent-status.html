<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card-frame">
  <div class="eyebrow">Agent status badge · health, class, last activity</div>
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div style="display:flex; align-items:center; gap:10px; padding:8px 12px; background:var(--obsidian-1); border:1px solid var(--hairline); border-radius:2px;">
      <span style="width:6px; height:6px; background:var(--ok); border-radius:50%; box-shadow:0 0 0 3px rgba(127,183,126,0.18);"></span>
      <span style="font-family:var(--font-mono); font-size:12px; color:var(--ink-0); flex:1;">market-analyst-ai</span>
      <span class="badge-strategic" style="font-size:10px;">STRATEGIC</span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-2);">30s · 99.9% · 450ms</span>
    </div>
    <div style="display:flex; align-items:center; gap:10px; padding:8px 12px; background:var(--obsidian-1); border:1px solid var(--hairline); border-radius:2px;">
      <span style="width:6px; height:6px; background:var(--warn); border-radius:50%; box-shadow:0 0 0 3px rgba(217,181,90,0.18);"></span>
      <span style="font-family:var(--font-mono); font-size:12px; color:var(--ink-0); flex:1;">risk-assessor-ai</span>
      <span class="badge-tactical" style="font-size:10px;">TACTICAL</span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--warn);">degraded · 92.4%</span>
    </div>
    <div style="display:flex; align-items:center; gap:10px; padding:8px 12px; background:var(--obsidian-1); border:1px solid var(--hairline); border-radius:2px;">
      <span style="width:6px; height:6px; background:var(--ink-3); border-radius:50%;"></span>
      <span style="font-family:var(--font-mono); font-size:12px; color:var(--ink-1); flex:1;">scenario-runner-ai</span>
      <span class="badge-operational" style="font-size:10px;">OPERATIONAL</span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">offline · 4h</span>
    </div>
  </div>
</div>
</body></html>
