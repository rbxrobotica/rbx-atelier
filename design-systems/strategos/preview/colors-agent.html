<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card-frame">
  <div class="eyebrow">Agent classes · governance accents</div>
  <div class="row" style="gap:14px">
    <div class="col" style="flex:1; padding:14px; border:1px solid var(--cyan-brand); background:rgba(0,255,255,0.06); border-radius:4px">
      <span class="badge-strategic">STRATEGIC</span>
      <span class="muted" style="font-size:11px">High-level decisions · requires human approval</span>
    </div>
    <div class="col" style="flex:1; padding:14px; border:1px solid var(--cyan-muted); background:rgba(0,255,255,0.04); border-radius:4px">
      <span class="badge-tactical">TACTICAL</span>
      <span class="muted" style="font-size:11px">Plan execution · medium autonomy</span>
    </div>
    <div class="col" style="flex:1; padding:14px; border:1px solid var(--ink-2); background:rgba(122,129,138,0.08); border-radius:4px">
      <span class="badge-operational">OPERATIONAL</span>
      <span class="muted" style="font-size:11px">Repetitive tasks · high autonomy</span>
    </div>
    <div class="col" style="flex:1; padding:14px; border:1px dashed var(--ink-3); border-radius:4px">
      <span class="badge-observer">OBSERVER</span>
      <span class="muted" style="font-size:11px">Monitoring only · no action</span>
    </div>
  </div>
</div>
</body></html>
