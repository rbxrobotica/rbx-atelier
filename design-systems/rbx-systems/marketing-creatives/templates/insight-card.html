<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="tokens.css" />
<title>RBX · insight card · 1:1</title>
<!-- viewport: 1080x1080 -->
</head>
<body>
<div class="stage" style="position:relative;">
  <span class="bracket tl"></span><span class="bracket tr"></span>
  <span class="bracket bl"></span><span class="bracket br"></span>

  <div style="position:absolute; inset:0; padding:96px 96px 88px; display:flex; flex-direction:column; justify-content:space-between;">
    <div>
      <div class="eyebrow">{{EYEBROW}}</div>
      <h1 class="headline" style="font-size:92px; margin-top:40px;">{{HEADLINE}}</h1>
    </div>

    <div>
      <div class="tick" style="margin-bottom:20px;">{{TICK}}</div>
      <p class="body" style="font-size:30px; max-width:760px;">{{BODY}}</p>
    </div>

    <div style="display:flex; align-items:center; justify-content:space-between;">
      <span class="mark">RBX · SYSTEMS</span>
      <span class="tick mono">{{META}}</span>
    </div>
  </div>
</div>
</body>
</html>
