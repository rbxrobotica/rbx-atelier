<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="tokens.css" />
<title>RBX · post vertical · 9:16</title>
<!-- viewport: 1080x1920 -->
</head>
<body>
<div class="stage" style="position:relative; background:var(--bg-0);">
  <span class="bracket tl"></span><span class="bracket br"></span>

  <div style="position:absolute; inset:0; padding:110px 104px; display:flex; flex-direction:column; justify-content:space-between;">
    <div>
      <div class="eyebrow">{{EYEBROW}}</div>
      <h1 class="headline" style="font-size:104px; margin-top:48px;">{{HEADLINE}}</h1>
      <p class="body" style="font-size:34px; margin-top:40px; max-width:820px;">{{LEAD}}</p>
    </div>

    <ul style="list-style:none; display:flex; flex-direction:column; gap:36px;">
      {{BULLETS}}
    </ul>

    <div>
      <div style="display:inline-block; border:1px solid var(--cyan-brand); padding:22px 40px; color:var(--cyan-brand); font-family:var(--font-mono); font-size:24px; letter-spacing:0.12em; text-transform:uppercase;">{{CTA}}</div>
      <div style="display:flex; align-items:center; justify-content:space-between; margin-top:44px;">
        <span class="mark">RBX · SYSTEMS</span>
        <span class="tick">{{FOOTER}}</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
