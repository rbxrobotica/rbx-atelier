<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="tokens.css" />
<title>RBX · carousel cover · 1:1</title>
<!-- viewport: 1080x1080 -->
</head>
<body>
<div class="stage" style="position:relative; background:var(--bg-1);">
  <span class="bracket tl"></span><span class="bracket br"></span>

  <div style="position:absolute; inset:0; padding:96px; display:flex; flex-direction:column; justify-content:space-between;">
    <div style="display:flex; align-items:flex-start; justify-content:space-between;">
      <div class="eyebrow">{{EYEBROW}}</div>
      <span class="tick mono">{{SLIDE_N}} / {{SLIDE_TOTAL}}</span>
    </div>

    <div>
      <div class="mono" style="font-size:200px; font-weight:600; color:var(--cyan-brand); line-height:1; letter-spacing:-0.03em;">{{BIG}}</div>
      <h1 class="headline" style="font-size:72px; margin-top:28px; max-width:880px;">{{HEADLINE}}</h1>
    </div>

    <div style="display:flex; align-items:center; justify-content:space-between;">
      <span class="mark">RBX · SYSTEMS</span>
      <span class="tick">{{FOOTER}}</span>
    </div>
  </div>
</div>
</body>
</html>
