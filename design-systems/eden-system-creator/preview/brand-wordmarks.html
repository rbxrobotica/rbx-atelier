<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Brand · Wordmarks</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--bg-1); color: var(--fg-0); font-family: var(--font-sans); padding: 22px 24px; }
  .row { background: var(--bg-0); border: 1px solid var(--border); border-radius: 2px; padding: 14px 18px; display: flex; align-items: center; gap: 18px; }
  .row + .row { margin-top: 8px; }
  .row img { height: 36px; width: auto; }
  .label { margin-left: auto; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-2); }
</style></head>
<body>
  <div class="row"><img src="../assets/rbx-wordmark.svg" alt="RBX"/><span class="label">rbx · holding</span></div>
  <div class="row"><img src="../assets/rbx-wordmark-systems.svg" alt="RBX Systems"/><span class="label">rbx systems</span></div>
  <div class="row"><img src="../assets/rbx-wordmark-robson.svg" alt="RBX Robson"/><span class="label">rbx robson</span></div>
  <div class="row"><img src="../assets/rbx-wordmark-truthmetal.svg" alt="RBX TruthMetal"/><span class="label">rbx truthmetal</span></div>
</body></html>
