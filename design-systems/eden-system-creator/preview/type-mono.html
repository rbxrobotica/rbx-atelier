<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Type · Mono & Numerics</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--bg-1); color: var(--fg-0); font-family: var(--font-mono); padding: 28px 32px; }
  .row { display: grid; grid-template-columns: 96px 1fr; gap: 24px; align-items: baseline; padding: 10px 0; border-top: 1px solid var(--border); }
  .row:first-child { border-top: 0; }
  .meta { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-2); }
  .v   { color: var(--fg-0); font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
  .status { text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500; font-size: 11px; }
  .lg  { font-size: 22px; font-weight: 500; }
  .num { font-size: 14px; }
  .small { font-size: 11px; color: var(--fg-2); }
</style></head>
<body>
  <div class="row"><div class="meta">Status · 11</div><div class="v status">RUNNING · COUNCIL · APPROVED · BLOCKED · ARCHIVED</div></div>
  <div class="row"><div class="meta">Metric · 22</div><div class="v lg">$0.41 · 12,840 tok · p99 48ms</div></div>
  <div class="row"><div class="meta">Numeric · 14</div><div class="v num">readiness 72% · 4 open risks · run #214 / 219</div></div>
  <div class="row"><div class="meta">Path · 11</div><div class="v small">org/rbx · system/strategos · mission/4HN-021</div></div>
</body></html>
