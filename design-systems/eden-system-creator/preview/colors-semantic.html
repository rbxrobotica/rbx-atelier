<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Colors · Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--bg-1); color: var(--fg-0); font-family: var(--font-sans); padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { border: 1px solid var(--border); border-radius: 2px; background: var(--bg-2); overflow: hidden; }
  .chip { height: 56px; }
  .row { padding: 10px 12px; }
  .row + .row { border-top: 1px solid var(--border); }
  .name { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--fg-1); }
  .hex  { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); margin-top: 2px; }
  .tag  { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--fg-0); padding: 4px 8px; border: 1px solid var(--border); border-radius: 2px; }
  .dot  { width: 6px; height: 6px; border-radius: 50%; }
</style></head>
<body>
  <div class="grid">
    <div class="sw">
      <div class="chip" style="background:#7FB77E"></div>
      <div class="row"><div class="name">ok</div><div class="hex">#7FB77E</div></div>
      <div class="row" style="background:rgba(127,183,126,0.12);"><span class="tag"><span class="dot" style="background:#7FB77E"></span>HEALTHY</span></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#D9B55A"></div>
      <div class="row"><div class="name">warn</div><div class="hex">#D9B55A</div></div>
      <div class="row" style="background:rgba(217,181,90,0.12);"><span class="tag"><span class="dot" style="background:#D9B55A"></span>REVIEW</span></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#C56A6A"></div>
      <div class="row"><div class="name">err</div><div class="hex">#C56A6A</div></div>
      <div class="row" style="background:rgba(197,106,106,0.12);"><span class="tag"><span class="dot" style="background:#C56A6A"></span>BLOCKED</span></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#7A93B0"></div>
      <div class="row"><div class="name">info</div><div class="hex">#7A93B0</div></div>
      <div class="row" style="background:rgba(122,147,176,0.12);"><span class="tag"><span class="dot" style="background:#7A93B0"></span>BRIEFING</span></div>
    </div>
  </div>
</body></html>
