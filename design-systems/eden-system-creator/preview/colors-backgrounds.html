<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Colors · Backgrounds</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--bg-1); color: var(--fg-0); font-family: var(--font-sans); padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .sw { border: 1px solid var(--border); border-radius: 2px; padding: 10px 10px 8px; }
  .chip { width: 100%; height: 64px; border-radius: 2px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.04); }
  .name { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--fg-1); }
  .hex  { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); margin-top: 1px; }
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#07080A"></div><div class="name">bg-0</div><div class="hex">#07080A</div></div>
    <div class="sw"><div class="chip" style="background:#0D0F12"></div><div class="name">bg-1</div><div class="hex">#0D0F12</div></div>
    <div class="sw"><div class="chip" style="background:#13161A"></div><div class="name">bg-2</div><div class="hex">#13161A</div></div>
    <div class="sw"><div class="chip" style="background:#1A1E23"></div><div class="name">bg-3</div><div class="hex">#1A1E23</div></div>
    <div class="sw"><div class="chip" style="background:#24282E"></div><div class="name">border</div><div class="hex">#24282E</div></div>
    <div class="sw"><div class="chip" style="background:#3A4048"></div><div class="name">border-str</div><div class="hex">#3A4048</div></div>
  </div>
</body></html>
