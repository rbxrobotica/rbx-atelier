<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Brand · Marks</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--bg-1); color: var(--fg-0); font-family: var(--font-sans); padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .cell { background: var(--bg-0); border: 1px solid var(--border); border-radius: 2px; padding: 18px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .cell img { height: 90px; width: auto; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-2); }
</style></head>
<body>
  <div class="grid">
    <div class="cell"><img src="../assets/rbx-mark.svg" alt="RBX mark"/><div class="label">rbx-mark · refined bitmap</div></div>
    <div class="cell"><img src="../assets/rbx-mark-geometric.svg" alt="RBX mark geometric"/><div class="label">rbx-mark · geometric R</div></div>
  </div>
</body></html>
