<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Radii & rings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--bg-1); color: var(--fg-0); font-family: var(--font-sans); padding: 22px 24px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .cell { background: var(--bg-2); border: 1px solid var(--border); padding: 14px 12px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 70px; height: 50px; background: var(--bg-3); border: 1px solid var(--border-strong); }
  .name { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--fg-1); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); }

  .r-none{ border-radius: 0; }
  .r-sm  { border-radius: 2px; }
  .r-md  { border-radius: 4px; }
  .r-lg  { border-radius: 8px; }
  .r-pill{ border-radius: 999px; }

  .ring-row { margin-top: 16px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .ringbox { padding: 14px 12px; background: var(--bg-2); display: flex; flex-direction: column; align-items: center; gap: 8px; border: 1px solid transparent; }
  .ring-1 { box-shadow: 0 0 0 1px var(--border); }
  .ring-2 { box-shadow: 0 0 0 1px var(--border-strong); }
  .ring-3 { box-shadow: 0 0 0 2px var(--cyan-brand); }
</style></head>
<body>
  <div class="row">
    <div class="cell"><div class="box r-none"></div><div class="name">none</div><div class="meta">0</div></div>
    <div class="cell"><div class="box r-sm"></div><div class="name">sm</div><div class="meta">2px · btn/input</div></div>
    <div class="cell"><div class="box r-md"></div><div class="name">md</div><div class="meta">4px · card</div></div>
    <div class="cell"><div class="box r-lg"></div><div class="name">lg</div><div class="meta">8px · modal</div></div>
    <div class="cell"><div class="box r-pill" style="height: 28px; width: 56px;"></div><div class="name">pill</div><div class="meta">status only</div></div>
  </div>
  <div class="ring-row">
    <div class="ringbox ring-1"><div class="name">ring</div><div class="meta">0 0 0 1px border</div></div>
    <div class="ringbox ring-2"><div class="name">ring-strong</div><div class="meta">0 0 0 1px border-strong</div></div>
    <div class="ringbox ring-3"><div class="name">ring-focus</div><div class="meta">0 0 0 2px cyan-brand</div></div>
  </div>
</body></html>
